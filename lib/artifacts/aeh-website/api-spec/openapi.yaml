openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Avviare Educational Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: applications
    description: Admission applications
  - name: contacts
    description: Contact inquiries
  - name: careers
    description: Career applications
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current admin user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List all admission applications
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, reviewing, accepted, rejected]
        - name: course
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Submit an admission application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationBody"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get a single application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Update application status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationStatusBody"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contact inquiries
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, read, replied]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Submit a contact inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Contact submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    patch:
      operationId: updateContactStatus
      tags: [contacts]
      summary: Update contact inquiry status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactStatusBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /careers:
    get:
      operationId: listCareers
      tags: [careers]
      summary: List all career applications
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, reviewing, hired, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of career applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerListResponse"
    post:
      operationId: createCareer
      tags: [careers]
      summary: Submit a career application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCareerBody"
      responses:
        "201":
          description: Career application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Career"

  /careers/{id}:
    patch:
      operationId: updateCareerStatus
      tags: [careers]
      summary: Update career application status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCareerStatusBody"
      responses:
        "200":
          description: Updated career application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Career"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/recent:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AdminUser"
      required: [token, user]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, admissions_officer, content_manager]
        name:
          type: string
      required: [id, username, role, name]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Application:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        course:
          type: string
        classType:
          type: string
          enum: [regular, weekend]
        message:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, reviewing, accepted, rejected]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, email, phone, course, classType, status, createdAt, updatedAt]

    CreateApplicationBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        course:
          type: string
        classType:
          type: string
          enum: [regular, weekend]
        message:
          type: string
      required: [name, email, phone, course, classType]

    UpdateApplicationStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, reviewing, accepted, rejected]
        notes:
          type: string
      required: [status]

    ApplicationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Application"
        total:
          type: integer
      required: [data, total]

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        message:
          type: string
        course:
          type: string
          nullable: true
        classType:
          type: string
          nullable: true
        status:
          type: string
          enum: [new, read, replied]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, email, phone, message, status, createdAt, updatedAt]

    CreateContactBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        message:
          type: string
        course:
          type: string
        classType:
          type: string
          enum: [regular, weekend]
      required: [name, email, phone, message]

    UpdateContactStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [new, read, replied]
      required: [status]

    ContactListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        total:
          type: integer
      required: [data, total]

    Career:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        position:
          type: string
          nullable: true
        cvUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, reviewing, hired, rejected]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, email, phone, status, createdAt, updatedAt]

    CreateCareerBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        position:
          type: string
        cvUrl:
          type: string
      required: [name, email, phone]

    UpdateCareerStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, reviewing, hired, rejected]
      required: [status]

    CareerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Career"
        total:
          type: integer
      required: [data, total]

    DashboardStats:
      type: object
      properties:
        totalApplications:
          type: integer
        pendingApplications:
          type: integer
        totalContacts:
          type: integer
        newContacts:
          type: integer
        totalCareers:
          type: integer
        applicationsByStatus:
          type: object
          additionalProperties:
            type: integer
        applicationsByCourse:
          type: array
          items:
            type: object
            properties:
              course:
                type: string
              count:
                type: integer
            required: [course, count]
      required: [totalApplications, pendingApplications, totalContacts, newContacts, totalCareers, applicationsByStatus, applicationsByCourse]

    RecentActivity:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [application, contact, career]
              id:
                type: integer
              name:
                type: string
              action:
                type: string
              createdAt:
                type: string
                format: date-time
            required: [type, id, name, action, createdAt]
      required: [items]
